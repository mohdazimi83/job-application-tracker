spring.application.name=job-application-tracker

# MySQL Database Connection — use environment variables on Railway
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/job_tracker_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Azim@#1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Gemini API Key — use environment variable on Railway
gemini.api.key=${GEMINI_API_KEY:your_local_gemini_key}
gemini.api.model=${GEMINI_API_MODEL:gemini-2.5-flash}

# Additional Config
spring.jpa.open-in-view=false
spring.sql.init.mode=never
logging.level.com.example.jobapplicationtracker=DEBUG

# Server Port — Railway injects PORT automatically
server.port=${PORT:8080}
