<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Application Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">💼</span>
        <h1>Job Application Tracker</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <main class="container">

    <!-- ADD APPLICATION FORM -->
    <section class="card form-card">
      <h2 class="section-title">Add New Application</h2>
      <form id="applicationForm" class="form-grid">
        <div class="form-group">
          <label for="companyName">Company Name <span class="required">*</span></label>
          <input type="text" id="companyName" placeholder="e.g. Google" required />
        </div>
        <div class="form-group">
          <label for="jobRole">Job Role <span class="required">*</span></label>
          <input type="text" id="jobRole" placeholder="e.g. Software Engineer" required />
        </div>
        <div class="form-group">
          <label for="dateApplied">Date Applied <span class="required">*</span></label>
          <input type="date" id="dateApplied" required />
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="APPLIED">Applied</option>
            <option value="INTERVIEW">Interview</option>
            <option value="OFFER">Offer</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Any additional notes..." rows="2"></textarea>
        </div>
        <div class="form-group full-width">
          <button type="submit" class="btn btn-primary">+ Add Application</button>
        </div>
      </form>
    </section>

    <!-- FILTER + TABLE -->
    <section class="card table-card">
      <div class="table-header">
        <h2 class="section-title">My Applications</h2>
        <div class="filter-group">
          <label for="filterStatus">Filter:</label>
          <select id="filterStatus">
            <option value="">All</option>
            <option value="APPLIED">Applied</option>
            <option value="INTERVIEW">Interview</option>
            <option value="OFFER">Offer</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="applicationsTable">
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Date Applied</th>
              <th>Status</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Rows populated by JS -->
          </tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none;">
          <span>📭</span>
          <p>No applications found. Start by adding one above!</p>
        </div>
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Interview Prep Questions</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div id="modalContent" class="modal-content">
        <!-- Questions populated by JS -->
      </div>
    </div>
  </div>

  <script src="/js/app.js?v=2"></script>
</body>
</html>
